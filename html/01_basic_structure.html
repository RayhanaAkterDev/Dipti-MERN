<!--
    Topic: HTML Basic Structure
    Purpose: Demonstrates the basic structure of an HTML5 document.
    Features:
        - HTML5 doctype declaration
        - Head metadata including title, author, description, keywords
        - Simple body structure
    Author: Rayhana Akter Sumaya
    Email: rayhanaaktersumaya.dev@gmail.com
    Last Updated: 2026-07-06
-->

<!doctype html>
<html lang="en">
    <head>
        <!-- Document Metadata -->
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            name="description"
            content="A simple HTML5 template demonstrating the basic structure of an HTML document."
        />

        <!-- NOTE: Included for learning purposes. -->
        <!-- Modern search engines (especially Google) generally ignore the keywords meta tag. -->
        <meta
            name="keywords"
            content="HTML, HTML5, Basic Structure, Document Structure"
        />

        <meta name="author" content="Rayhana Akter Sumaya" />
        <title>HTML Basic Structure</title>
    </head>
    <body>
        <!-- Main Content -->
        <h1>HTML Basic Structure</h1>
        <p>This page demonstrates the basic structure of an HTML5 document.</p>
    </body>
</html>

<!doctype html>
<html lang="en">
    <head>
        <!-- Document Metadata -->
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            name="description"
            content="Demonstrates the use of HTML heading and paragraph elements."
        />
        <meta name="author" content="Rayhana Akter Sumaya" />
        <title>HTML Headings and Paragraphs</title>
    </head>
    <body>
        <!-- Main Content -->
        <main>
            <!-- Headings from h1 to h6 -->
            <h1>HTML Headings</h1>
            <h2>Heading Level 2</h2>
            <h3>Heading Level 3</h3>
            <h4>Heading Level 4</h4>
            <h5>Heading Level 5</h5>
            <h6>Heading Level 6</h6>

            <!-- Paragraphs -->
            <p>
                Paragraphs organize blocks of text to improve readability and
                structure on web pages.
            </p>
            <p>
                The <code>&lt;p&gt;</code> element defines a paragraph in HTML.
                Proper use enhances accessibility and SEO.
            </p>
        </main>
    </body>
</html>

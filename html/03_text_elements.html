<!--
    Topic: HTML Text Elements
    Purpose: Demonstrates commonly used HTML text elements, including line breaks, horizontal rules, and text emphasis.
    Features:
        - Line breaks (<br>)
        - Horizontal rules (<hr>)
        - Strong importance (<strong>)
        - Emphasized text (<em>)
        - Combined emphasis (<strong><em>)
    Author: Rayhana Akter Sumaya
    Email: rayhanaaktersumaya.dev@gmail.com
    Last Updated: 2025-07-06
-->

<!doctype html>
<html lang="en">
    <head>
        <!-- Document Metadata -->
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            name="description"
            content="Demonstrates the use of HTML text elements."
        />
        <meta name="author" content="Rayhana Akter Sumaya" />
        <title>HTML Text Elements</title>
    </head>
    <body>
        <!-- Main Content -->
        <main>
            <h1>HTML Text Elements</h1>

            <!-- Line Break -->
            <p>
                This is a line of text.<br />
                This is a new line created with a line break.
            </p>

            <!-- Horizontal Rule -->
            <hr />

            <!-- Text Emphasis -->
            <p>
                Use <strong>strong</strong> to indicate important text, and
                <em>emphasis</em> to stress certain words.
            </p>

            <p>
                You can combine them for
                <strong><em>strong emphasis</em></strong
                >.
            </p>
        </main>
    </body>
</html>
